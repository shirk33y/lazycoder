repos:
  - shirk33y/lazycoder

budget:
  soft_limit_daily: 0.50
  hard_limit_daily: 1.00
  cost_overrun_multiplier: 2.0

models:
  planner: anthropic/claude-sonnet-4-6
  summarizer: anthropic/claude-haiku-4-5-20251001
  executor: anthropic/claude-haiku-4-5-20251001

github:
  token_env: GITHUB_TOKEN
  bot_username: lazycoder-bot

branch_prefix: bot/run
task_delay_seconds: 60

priority_labels:
  - priority/critical
  - priority/high
  - priority/medium
  - priority/low

blocked_labels:
  - needs-human
  - wontfix
  - bot-meta
